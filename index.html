<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Débat National</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css">
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Game Config Screen (shown when "Nouvelle partie" is clicked) -->
    <div id="splashScreen" class="hidden fixed inset-0 gradient-bg flex items-center justify-center p-4 z-50 modal-overlay">
        <div class="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full card-shadow fade-in modal-content">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 mb-2">🗳️ Political Madness</h1>
                <p class="text-gray-600">Débattez avec l'IA sur des sujets clivants</p>
            </div>

            <form id="gameConfig" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Votre nom</label>
                    <input type="text" id="playerName" class="w-full input-field px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Entrez votre nom" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Difficulté</label>
                    <select id="difficulty" class="w-full input-field px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="facile">Facile</option>
                        <option value="moyen" selected>Moyen</option>
                        <option value="difficile">Difficile</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Thème</label>
                    <select id="theme" class="w-full input-field px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="politique">Politique</option>
                        <option value="societe">Société</option>
                        <option value="economie">Économie</option>
                        <option value="environnement">Environnement</option>
                        <option value="sante">Santé</option>
                        <option value="education">Éducation</option>
                        <option value="random">Aléatoire</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Adversaire IA</label>
                    <select id="aiOpponent" class="w-full input-field px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="conservateur">Alex - Conservateur</option>
                        <option value="liberal">Marie - Libérale</option>
                        <option value="centriste">Thomas - Centriste</option>
                        <option value="radical">Luna - Radicale</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Position</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center">
                            <input type="radio" name="position" value="pour" class="mr-2" checked>
                            <span class="text-green-600 font-medium">Pour</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="position" value="contre" class="mr-2">
                            <span class="text-red-600 font-medium">Contre</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full btn-primary text-white py-3 px-6 rounded-lg font-semibold transform hover:scale-105">
                    Commencer le jeu
                </button>
            </form>
        </div>
    </div>

    <!-- Home Menu Screen (main screen) -->
    <div id="homeScreen" class="fixed inset-0 gradient-bg flex items-center justify-center p-4 z-50">
        <!-- HomeMenu component will be injected here -->
    </div>

    <!-- Options Screen -->
    <div id="optionsScreen" class="hidden fixed inset-0 gradient-bg flex items-center justify-center p-4 z-50">
        <!-- OptionsScreen component will be injected here -->
    </div>

    <!-- New Game Wizard Screen -->
    <div id="newGameScreen" class="hidden">
        <!-- NewGameWizard component will be injected here -->
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden min-h-screen bg-gray-50">
        <!-- Header -->
        <div class="bg-white shadow-sm border-b">
            <div class="px-4 py-3">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="currentTheme" class="text-lg font-semibold text-gray-800"></h2>
                        <p id="playerPosition" class="text-sm text-gray-600"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-500">Duel <span id="currentDuel">1</span>/5</p>
                        <p class="text-sm text-gray-500">Échange <span id="currentExchange">1</span>/3</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-4 space-y-4 min-h-screen max-w-4xl mx-auto">
            <!-- Journalist Statement -->
            <div class="debate-card journalist p-4 rounded-r-lg">
                <div class="flex items-start">
                    <i class="fas fa-microphone text-yellow-600 text-xl mr-3 mt-1"></i>
                    <div class="flex-1">
                        <h3 class="font-semibold text-gray-800 mb-2">Journaliste</h3>
                        <p id="journalistStatement" class="text-gray-700 leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <!-- AI Response -->
            <div class="debate-card ai p-4 rounded-r-lg">
                <div class="flex items-start">
                    <i class="fas fa-robot text-blue-600 text-xl mr-3 mt-1"></i>
                    <div class="flex-1">
                        <h3 id="aiOpponentName" class="font-semibold text-gray-800 mb-2"></h3>
                        <p id="aiResponse" class="text-gray-700 leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <!-- Player Input -->
            <div class="bg-white rounded-lg shadow-sm border p-4 debate-card player">
                <label class="block text-sm font-medium text-gray-700 mb-2">Votre réponse</label>
                <textarea id="playerInput" class="w-full input-field px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none" rows="3" placeholder="Exprimez votre opinion..."></textarea>
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-3 gap-2">
                    <span class="text-sm text-gray-500">Caractères: <span id="charCount">0</span>/500</span>
                    <button id="sendResponse" class="btn-primary text-white px-6 py-2 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed w-full sm:w-auto">
                        Envoyer
                    </button>
                </div>
            </div>
        </div>

        <!-- Persuasion Gauge -->
        <div class="bg-white border-t p-4 max-w-4xl mx-auto">
            <div class="text-center mb-3">
                <h3 class="font-semibold text-gray-800">Niveau de persuasion</h3>
            </div>
            <div class="relative persuasion-gauge">
                <div class="w-full bg-gray-200 rounded-full h-4">
                    <div id="persuasionBar" class="persuasion-bar bg-gradient-to-r from-red-500 via-yellow-500 to-green-500 h-4 rounded-full transition-all duration-500" style="width: 50%"></div>
                </div>
                <div class="flex justify-between mt-2 text-sm">
                    <span class="text-red-600 font-medium">IA gagne</span>
                    <span class="text-gray-500">Égalité</span>
                    <span class="text-green-600 font-medium">Vous gagnez</span>
                </div>
            </div>
            <div class="text-center mt-3">
                <span id="persuasionScore" class="text-lg font-bold text-gray-800">50%</span>
            </div>
        </div>
    </div>

    <!-- Summary Modal -->
    <div id="summaryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 modal-overlay">
        <div class="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-96 overflow-y-auto card-shadow modal-content">
            <div class="text-center mb-4">
                <h3 class="text-2xl font-bold text-gray-800">Résumé du débat</h3>
            </div>
            <div id="summaryContent" class="text-gray-700 mb-6 leading-relaxed"></div>
            <div class="text-center">
                <button id="nextDuel" class="btn-primary text-white py-3 px-8 rounded-lg font-semibold transition-all duration-200">
                    Duel suivant
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 modal-overlay">
        <div class="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full card-shadow text-center modal-content">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Fin du jeu !</h2>
            <div id="finalScore" class="text-xl text-gray-600 mb-6 leading-relaxed"></div>
            <button id="playAgain" class="btn-primary text-white py-3 px-8 rounded-lg font-semibold transition-all duration-200">
                Rejouer
            </button>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
